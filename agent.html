<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexClinic | AI Receptionist</title>
    
    <style>
        /* --- GLOBAL STYLES --- */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #0f172a; 
            color: #f8fafc;
            /* 5vw on each side creates a 10% total empty border on desktop */
            padding: 4vh 5vw; 
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
        }

        .container {
            width: 100%;
            max-width: 1150px; /* Increased width for a more commanding desktop presence */
            display: flex;
            flex-direction: column;
            gap: 25px; /* Added more vertical space between sections */
            text-align: center;
        }

        header {
            margin-bottom: 5px;
        }

        h1 {
            font-size: 2.8rem; /* Larger font for desktop */
            font-weight: 800;
            letter-spacing: -1.5px;
        }

        h1 span { color: #4CAF50; }

        p.subtitle {
            color: #94a3b8;
            font-size: 1.1rem;
            margin-top: 5px;
        }

        /* --- 1. WAVEFORM (ENLARGED) --- */
        #waveform-container {
            width: 100%;
            height: 280px; /* Increased height for a "bigger" feel */
            background: #000000;
            border-radius: 24px;
            position: relative;
            border: 1px solid #1e293b;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.6);
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        canvas {
            width: 100%;
            height: 100%;
        }

        /* --- 2. CONTROLS --- */
        .controls {
            display: flex;
            gap: 15px;
            justify-content: center;
        }

        .btn {
            padding: 15px 40px;
            font-size: 1rem;
            font-weight: 700;
            border: none;
            border-radius: 60px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        #call-btn {
            background: #4CAF50;
            color: white;
            box-shadow: 0 8px 20px rgba(76, 175, 80, 0.2);
        }

        #call-btn:hover { 
            transform: scale(1.05); 
            background: #45a049; 
            box-shadow: 0 12px 25px rgba(76, 175, 80, 0.3);
        }

        #decline-btn { background: #1e293b; color: #94a3b8; }
        #decline-btn:hover { background: #ef4444; color: white; }

        /* --- 3. STATUS BAR --- */
        #status-box {
            font-size: 0.85rem;
            color: #64748b;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* --- 4. DASHBOARD (ENLARGED) --- */
        .dashboard {
            display: flex;
            justify-content: space-between;
            gap: 20px;
            width: 100%;
        }

        .card {
            flex: 1;
            background: rgba(30, 41, 59, 0.4);
            padding: 30px 20px; /* Increased vertical padding to make cards taller */
            border-radius: 20px;
            border: 1px solid #1e293b;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .card:hover {
            border-color: #4CAF50;
            background: rgba(30, 41, 59, 0.6);
            transform: translateY(-5px);
        }

        .card-label {
            font-size: 0.75rem;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 8px;
        }

        .card-value {
            font-size: 2rem; /* Scaled up value numbers */
            font-weight: 800;
            color: #ffffff;
        }

        /* --- RESPONSIVE ADJUSTMENTS --- */
        @media (max-width: 1024px) {
            .container { max-width: 900px; }
            #waveform-container { height: 220px; }
        }

        @media (max-width: 768px) {
            body { padding: 20px; } 
            .dashboard { flex-direction: column; gap: 15px; }
            .controls { flex-direction: column; width: 100%; }
            .btn { width: 100%; justify-content: center; }
            h1 { font-size: 2rem; }
            #waveform-container { height: 180px; }
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>NexClinic <span>AI</span></h1>
            <p class="subtitle">Next-Generation Voice Receptionist</p>
        </header>

        <!-- Order #1: Waveform -->
        <div id="waveform-container">
            <canvas id="waveform-canvas"></canvas>
        </div>

        <!-- Order #2: Call Controls -->
        <div class="controls">
            <button id="call-btn" class="btn"><span>📞</span> Start Call</button>
            <button id="decline-btn" class="btn"><span>🛑</span> End Connection</button>
        </div>

        <!-- Order #3: Status -->
        <div id="status-box">Status: Disconnected</div>

        <!-- Order #4: Dashboard Stats -->
        <div class="dashboard">
            <div class="card">
                <div class="card-label">Calls Handled</div>
                <div class="card-value" id="stat-calls">0</div>
            </div>
            <div class="card">
                <div class="card-label">Talk Time</div>
                <div class="card-value" id="stat-time">0m 0s</div>
            </div>
            <div class="card">
                <div class="card-label">Appointments</div>
                <div class="card-value" id="stat-apps">0</div>
            </div>
        </div>
    </div>

    <script type="module">
        import Vapi from "https://esm.sh/@vapi-ai/web";

        const vapi = new Vapi("860dd056-1472-45de-a12e-df59fad649e5");
        const assistantId = "f4c6961f-9aa9-44e2-ba6e-ceb7d8233c32";

        const canvas = document.getElementById("waveform-canvas");
        const ctx = canvas.getContext("2d");
        const statusBox = document.getElementById("status-box");

        let audioContext, analyser, dataArray, animationId;
        let userAmp = 0, agentAmp = 0, phase = 0;

        function resize() {
            canvas.width = canvas.offsetWidth;
            canvas.height = canvas.offsetHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        // Increment Animation
        function animateValue(id, start, end, duration, suffix = "") {
            const obj = document.getElementById(id);
            let startTimestamp = null;
            const step = (timestamp) => {
                if (!startTimestamp) startTimestamp = timestamp;
                const progress = Math.min((timestamp - startTimestamp) / duration, 1);
                
                if (id === "stat-time") {
                    const totalSecs = Math.floor(progress * ((56 * 60) + 33));
                    obj.innerHTML = `${Math.floor(totalSecs/60)}m ${totalSecs%60}s${suffix}`;
                } else {
                    obj.innerHTML = Math.floor(progress * (end - start) + start) + suffix;
                }
                if (progress < 1) window.requestAnimationFrame(step);
            };
            window.requestAnimationFrame(step);
        }

        window.addEventListener('load', () => {
            animateValue("stat-calls", 0, 70, 2000, "+");
            animateValue("stat-time", 0, 0, 2000, "+");
            animateValue("stat-apps", 0, 49, 2000, "+");
        });

        // Waveform Logic
        async function startVisualizer() {
            try {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                const source = audioContext.createMediaStreamSource(stream);
                analyser = audioContext.createAnalyser();
                analyser.fftSize = 1024;
                source.connect(analyser);
                dataArray = new Uint8Array(analyser.frequencyBinCount);
                draw();
            } catch (err) { console.error(err); }
        }

        function draw() {
            animationId = requestAnimationFrame(draw);
            analyser.getByteTimeDomainData(dataArray);
            let sum = 0;
            for (let i = 0; i < dataArray.length; i++) {
                let v = (dataArray[i] - 128) / 128;
                sum += v * v;
            }
            userAmp = Math.sqrt(sum / dataArray.length) * 160;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Draw Waves
            drawSineWave(userAmp, "#ff4b2b", 0.6, 1.2); // Patient
            drawSineWave(agentAmp * 50, "#4CAF50", 0.8, 1.0); // AI Agent (Boosted)
            
            phase += 0.15;
        }

        function drawSineWave(amp, color, opacity, freq) {
            ctx.beginPath();
            ctx.lineWidth = 4; // Slightly thicker lines for the bigger scale
            ctx.strokeStyle = color;
            ctx.globalAlpha = opacity;
            for (let x = 0; x < canvas.width; x++) {
                let y = (canvas.height / 2) + amp * Math.sin((x / 60) * freq + phase);
                if (x === 0) ctx.moveTo(x, y);
                else ctx.lineTo(x, y);
            }
            ctx.stroke();
        }

        document.getElementById("call-btn").addEventListener("click", () => {
            vapi.start(assistantId);
            startVisualizer();
        });

        document.getElementById("decline-btn").addEventListener("click", () => { vapi.stop(); });

        vapi.on('call-start', () => { 
            statusBox.innerText = "Live Connection"; 
            statusBox.style.color = "#4CAF50"; 
        });

        vapi.on('call-end', () => { 
            cancelAnimationFrame(animationId);
            statusBox.innerText = "Disconnected"; 
            statusBox.style.color = "#64748b";
            userAmp = 0; agentAmp = 0;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
        });

        vapi.on('volume-level', (v) => { agentAmp = v; });
    </script>
</body>
</html>
