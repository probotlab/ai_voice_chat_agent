<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexClinic | AI Receptionist</title>
    
    <style>
        /* --- GLOBAL STYLES --- */
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #0f172a; 
            color: #f8fafc;
            padding: 2vh 5vw; 
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden; 
        }

        .container {
            width: 100%;
            max-width: 1100px;
            height: 98vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 20px;
            text-align: center;
        }

        h1 {
            font-size: clamp(1.5rem, 4vh, 2.2rem);
            font-weight: 800;
            letter-spacing: -1px;
            margin: 0;
        }

        h1 span { color: #4CAF50; }

        .subtitle {
            color: #94a3b8;
            font-size: clamp(0.8rem, 2vh, 0.95rem);
            margin-bottom: 2px;
        }

        /* --- 1. WAVEFORM --- */
        #waveform-container {
            width: 100%;
            height: 18vh; 
            background: #000000;
            border-radius: 7px;
            border: 1px solid #1e293b;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        canvas { width: 100%; height: 100%; }

        /* --- 2. CONTROLS --- */
        .controls { display: flex; gap: 12px; justify-content: center; }

        .btn {
            padding: 10px 25px;
            font-size: 0.9rem;
            font-weight: 700;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: 0.2s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        #call-btn { background: #4CAF50; color: white; }
        #decline-btn { background: #1e293b; color: #94a3b8; }
        #decline-btn:hover { background: #ef4444; color: white; }

        #status-box {
            font-size: 0.7rem;
            color: #64748b;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }

        /* --- 3. ACTIVITY SUMMARY --- */
        #summary-section { width: 100%; margin: 5px 0; }

        .summary-header {
            font-size: 0.7rem;
            color: #4CAF50;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 8px;
            font-weight: 800;
        }

        .summary-table {
            background: rgba(30, 41, 59, 0.4);
            border: 1px solid #1e293b;
            border-radius: 12px;
            padding: 15px;
            display: flex;
            justify-content: space-around;
            gap: 10px;
        }

        .summary-cell span {
            display: block;
            font-size: 0.6rem;
            color: #94a3b8;
            text-transform: uppercase;
            margin-bottom: 3px;
        }

        .summary-cell div { font-size: 0.9rem; font-weight: 700; color: #ffffff; }

        .status-booked { color: #4CAF50 !important; }
        .status-cancelled { color: #ef4444 !important; }

        /* --- 4. DASHBOARD STATS --- */
        .dashboard { display: flex; justify-content: space-between; gap: 12px; width: 100%; }

        .card {
            flex: 1;
            background: rgba(30, 41, 59, 0.3);
            padding: 1.5vh 10px;
            border-radius: 12px;
            border: 1px solid #1e293b;
        }

        .card-label { font-size: 0.6rem; color: #94a3b8; text-transform: uppercase; margin-bottom: 4px; }
        .card-value { font-size: clamp(1rem, 2.5vh, 1.4rem); font-weight: 800; color: #ffffff; }

        @media (max-width: 768px) {
            body { overflow: auto; height: auto; padding: 20px; }
            .container { height: auto; gap: 15px; }
            .dashboard, .summary-table { flex-direction: column; }
            .controls { flex-direction: column; }
            .btn { width: 100%; justify-content: center; }
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>NexClinic <span>AI</span></h1>
            <p class="subtitle">Next-Gen Voice Receptionist</p>
        </header>

        <div id="waveform-container">
            <canvas id="waveform-canvas"></canvas>
        </div>

        <div class="controls">
            <button id="call-btn" class="btn"><span>📞</span> Call</button>
            <button id="decline-btn" class="btn"><span>🛑</span> Decline</button>
        </div>

        <div id="status-box">Status: Disconnected</div>

        <div id="summary-section">
            <div class="summary-header">Session Activity</div>
            <div class="summary-table">
                <div class="summary-cell"><span>Patient</span><div id="sum-name">-</div></div>
                <div class="summary-cell"><span>Action</span><div id="sum-status">-</div></div>
                <div class="summary-cell"><span>Reason</span><div id="sum-reason">-</div></div>
                <div class="summary-cell"><span>Schedule</span><div id="sum-date">-</div></div>
            </div>
        </div>

        <div class="dashboard">
            <div class="card"><div class="card-label">Calls Handled</div><div class="card-value" id="stat-calls">0</div></div>
            <div class="card"><div class="card-label">Talk Time</div><div class="card-value" id="stat-time">0m 0s</div></div>
            <div class="card"><div class="card-label">Appointments</div><div class="card-value" id="stat-apps">0</div></div>
        </div>
    </div>

    <script type="module">
        import Vapi from "https://esm.sh/@vapi-ai/web";

        const vapi = new Vapi("860dd056-1472-45de-a12e-df59fad649e5");
        const assistantId = "f4c6961f-9aa9-44e2-ba6e-ceb7d8233c32";

        const canvas = document.getElementById("waveform-canvas");
        const ctx = canvas.getContext("2d");
        const statusBox = document.getElementById("status-box");

        let audioContext, analyser, dataArray, animationId;
        let userAmp = 0, agentAmp = 0, phase = 0;
        let currentCallStartTime = null; 

        function resize() {
            canvas.width = canvas.offsetWidth;
            canvas.height = canvas.offsetHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        // --- DASHBOARD ANIMATION LOGIC ---
        function animateValue(id, start, end, duration, suffix = "") {
            const obj = document.getElementById(id);
            let startTimestamp = null;
            const step = (timestamp) => {
                if (!startTimestamp) startTimestamp = timestamp;
                const progress = Math.min((timestamp - startTimestamp) / duration, 1);
                if (id === "stat-time") {
                    const secs = Math.floor(progress * ((56 * 60) + 33));
                    obj.innerHTML = `${Math.floor(secs/60)}m ${secs%60}s${suffix}`;
                } else {
                    obj.innerHTML = Math.floor(progress * (end - start) + start) + suffix;
                }
                if (progress < 1) window.requestAnimationFrame(step);
            };
            window.requestAnimationFrame(step);
        }

        window.addEventListener('load', () => {
            animateValue("stat-calls", 0, 70, 2000, "+");
            animateValue("stat-time", 0, 0, 2000, "+");
            animateValue("stat-apps", 0, 49, 2000, "+");
        });

        // --- SESSION PRIVACY LOGIC ---
        function resetTable() {
            document.getElementById('sum-name').innerText = "-";
            document.getElementById('sum-status').innerText = "-";
            document.getElementById('sum-status').className = "";
            document.getElementById('sum-reason').innerText = "-";
            document.getElementById('sum-date').innerText = "-";
        }

        async function fetchLatestActivity() {
            if (!currentCallStartTime) {
                resetTable();
                return;
            }

            try {
                const response = await fetch(`/latest_activity/?since=${currentCallStartTime}`);
                const data = await response.json();

                const nameEl = document.getElementById('sum-name');
                const statusEl = document.getElementById('sum-status');
                const reasonEl = document.getElementById('sum-reason');
                const dateEl = document.getElementById('sum-date');

                if (nameEl.innerText !== data.name) {
                    nameEl.innerText = data.name;
                    statusEl.innerText = data.status;
                    statusEl.className = data.status === "BOOKED" ? 'status-booked' : 'status-cancelled';
                    reasonEl.innerText = data.reason;
                    dateEl.innerText = data.date;
                }
            } catch (err) { console.log("DB Sync..."); }
        }

        setInterval(fetchLatestActivity, 1000);

        // Waveform Visualizer
        async function startVisualizer() {
            try {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                const source = audioContext.createMediaStreamSource(stream);
                analyser = audioContext.createAnalyser();
                analyser.fftSize = 1024;
                source.connect(analyser);
                dataArray = new Uint8Array(analyser.frequencyBinCount);
                draw();
            } catch (err) { console.error(err); }
        }

        function draw() {
            animationId = requestAnimationFrame(draw);
            analyser.getByteTimeDomainData(dataArray);
            let sum = 0;
            for (let i = 0; i < dataArray.length; i++) {
                let v = (dataArray[i] - 128) / 128;
                sum += v * v;
            }
            userAmp = Math.sqrt(sum / dataArray.length) * 120;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            drawSineWave(userAmp *3, "#ff4b2b", 0.6, 1.2); 
            drawSineWave(agentAmp * 30, "#4CAF50", 0.8, 1.0); 
            phase += 0.15;
        }

        function drawSineWave(amp, color, opacity, freq) {
            ctx.beginPath();
            ctx.lineWidth = 3;
            ctx.strokeStyle = color;
            ctx.globalAlpha = opacity;
            for (let x = 0; x < canvas.width; x++) {
                let y = (canvas.height / 2) + amp * Math.sin((x / 60) * freq + phase);
                if (x === 0) ctx.moveTo(x, y);
                else ctx.lineTo(x, y);
            }
            ctx.stroke();
        }

        // --- EVENTS ---
        document.getElementById("call-btn").addEventListener("click", () => {
            vapi.start(assistantId);
            startVisualizer();
        });

        document.getElementById("decline-btn").addEventListener("click", () => { vapi.stop(); });

        vapi.on('call-start', () => { 
            currentCallStartTime = new Date().toISOString(); 
            resetTable(); 
            statusBox.innerText = "Live Connection"; 
            statusBox.style.color = "#4CAF50"; 
        });

        vapi.on('call-end', () => { 
            currentCallStartTime = null; 
            resetTable(); 
            cancelAnimationFrame(animationId);
            statusBox.innerText = "Disconnected"; 
            statusBox.style.color = "#64748b";
            userAmp = 0; agentAmp = 0;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
        });

        vapi.on('volume-level', (v) => { agentAmp = v; });
    </script>
</body>
</html>
