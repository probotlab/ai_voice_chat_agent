<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexClinic | AI Receptionist</title>
    
    <style>
        /* --- GLOBAL STYLES --- */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #0f172a; 
            color: #f8fafc;
            /* Creates the "empty borders" effect (approx 20% total) */
            padding: 5vh 10vw; 
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
        }

        .container {
            width: 100%;
            max-width: 900px;
            display: flex;
            flex-direction: column;
            gap: 15px; /* Tightened spacing to fit screen */
            text-align: center;
        }

        h1 {
            font-size: 2rem; /* Scaled down slightly */
            font-weight: 700;
            letter-spacing: -1px;
        }

        h1 span { color: #4CAF50; }

        p.subtitle {
            color: #94a3b8;
            font-size: 0.95rem;
            margin-top: -10px;
        }

        /* --- THE WAVEFORM (MADE SMALLER) --- */
        #waveform-container {
            width: 100%;
            height: 180px; /* Reduced from 250px to save space */
            background: #000000;
            border-radius: 20px;
            position: relative;
            border: 1px solid #1e293b;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.4);
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        canvas {
            width: 100%;
            height: 100%;
        }

        /* --- CONTROLS --- */
        .controls {
            display: flex;
            gap: 12px;
            justify-content: center;
        }

        .btn {
            padding: 12px 28px;
            font-size: 0.9rem;
            font-weight: 600;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        #call-btn {
            background: #4CAF50;
            color: white;
            box-shadow: 0 4px 15px rgba(76, 175, 80, 0.2);
        }

        #call-btn:hover { transform: translateY(-2px); background: #45a049; }

        #decline-btn { background: #1e293b; color: #94a3b8; }
        #decline-btn:hover { background: #ef4444; color: white; }

        /* --- STATUS BAR --- */
        #status-box {
            font-size: 0.75rem;
            color: #64748b;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin: 5px 0;
        }

        /* --- DASHBOARD (NOW AT THE BOTTOM) --- */
        .dashboard {
            display: flex;
            justify-content: space-between;
            gap: 15px;
            width: 100%;
        }

        .card {
            flex: 1;
            background: rgba(30, 41, 59, 0.4);
            padding: 15px; /* Smaller padding */
            border-radius: 16px;
            border: 1px solid #1e293b;
            transition: all 0.3s ease;
        }

        .card-label {
            font-size: 0.65rem;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 5px;
        }

        .card-value {
            font-size: 1.4rem;
            font-weight: 700;
            color: #ffffff;
        }

        /* --- RESPONSIVE --- */
        @media (max-width: 768px) {
            body { padding: 20px; } /* Remove 20% border on small mobiles */
            .dashboard { flex-direction: column; }
            .controls { flex-direction: column; width: 100%; }
            .btn { width: 100%; justify-content: center; }
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>NexClinic <span>AI</span></h1>
            <p class="subtitle">Next-Generation Voice Receptionist</p>
        </header>

        <!-- 1. Waveform -->
        <div id="waveform-container">
            <canvas id="waveform-canvas"></canvas>
        </div>

        <!-- 2. Call Controls -->
        <div class="controls">
            <button id="call-btn" class="btn"><span>📞</span> Start Call</button>
            <button id="decline-btn" class="btn"><span>🛑</span> End Connection</button>
        </div>

        <!-- 3. Status Bar -->
        <div id="status-box">Status: Disconnected</div>

        <!-- 4. Dashboard Stats (Bottom) -->
        <div class="dashboard">
            <div class="card">
                <div class="card-label">Calls Handled</div>
                <div class="card-value" id="stat-calls">0</div>
            </div>
            <div class="card">
                <div class="card-label">Talk Time</div>
                <div class="card-value" id="stat-time">0m 0s</div>
            </div>
            <div class="card">
                <div class="card-label">Appointments</div>
                <div class="card-value" id="stat-apps">0</div>
            </div>
        </div>
    </div>

    <script type="module">
        import Vapi from "https://esm.sh/@vapi-ai/web";

        const vapi = new Vapi("860dd056-1472-45de-a12e-df59fad649e5");
        const assistantId = "f4c6961f-9aa9-44e2-ba6e-ceb7d8233c32";

        const canvas = document.getElementById("waveform-canvas");
        const ctx = canvas.getContext("2d");
        const statusBox = document.getElementById("status-box");

        let audioContext, analyser, dataArray, animationId;
        let userAmp = 0, agentAmp = 0, phase = 0;

        function resize() {
            canvas.width = canvas.offsetWidth;
            canvas.height = canvas.offsetHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        // --- DASHBOARD ANIMATION ---
        function animateValue(id, start, end, duration, suffix = "") {
            const obj = document.getElementById(id);
            let startTimestamp = null;
            const step = (timestamp) => {
                if (!startTimestamp) startTimestamp = timestamp;
                const progress = Math.min((timestamp - startTimestamp) / duration, 1);
                
                if (id === "stat-time") {
                    const currentTotalSecs = Math.floor(progress * ((56 * 60) + 33));
                    const mins = Math.floor(currentTotalSecs / 60);
                    const secs = currentTotalSecs % 60;
                    obj.innerHTML = `${mins}m ${secs}s${suffix}`;
                } else {
                    obj.innerHTML = Math.floor(progress * (end - start) + start) + suffix;
                }
                if (progress < 1) window.requestAnimationFrame(step);
            };
            window.requestAnimationFrame(step);
        }

        window.addEventListener('load', () => {
            animateValue("stat-calls", 0, 70, 2000, "+");
            animateValue("stat-time", 0, 0, 2000, "+");
            animateValue("stat-apps", 0, 49, 2000, "+");
        });

        // --- WAVEFORM ENGINE ---
        async function startVisualizer() {
            try {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                const source = audioContext.createMediaStreamSource(stream);
                analyser = audioContext.createAnalyser();
                analyser.fftSize = 1024;
                source.connect(analyser);
                dataArray = new Uint8Array(analyser.frequencyBinCount);
                draw();
            } catch (err) { console.error(err); }
        }

        function draw() {
            animationId = requestAnimationFrame(draw);
            analyser.getByteTimeDomainData(dataArray);
            let sum = 0;
            for (let i = 0; i < dataArray.length; i++) {
                let v = (dataArray[i] - 128) / 128;
                sum += v * v;
            }
            userAmp = Math.sqrt(sum / dataArray.length) * 150;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            drawSineWave(userAmp *50, "#ff4b2b", 0.6, 1.2); 
            drawSineWave(agentAmp * 50, "#4CAF50", 0.8, 1.0); 
            phase += 0.15;
        }

        function drawSineWave(amp, color, opacity, freq) {
            ctx.beginPath();
            ctx.lineWidth = 3;
            ctx.strokeStyle = color;
            ctx.globalAlpha = opacity;
            for (let x = 0; x < canvas.width; x++) {
                let y = (canvas.height / 2) + amp * Math.sin((x / 60) * freq + phase);
                if (x === 0) ctx.moveTo(x, y);
                else ctx.lineTo(x, y);
            }
            ctx.stroke();
        }

        // --- EVENTS ---
        document.getElementById("call-btn").addEventListener("click", () => {
            vapi.start(assistantId);
            startVisualizer();
        });

        document.getElementById("decline-btn").addEventListener("click", () => { vapi.stop(); });

        vapi.on('call-start', () => { statusBox.innerText = "Live Connection"; statusBox.style.color = "#4CAF50"; });
        vapi.on('call-end', () => { 
            cancelAnimationFrame(animationId);
            statusBox.innerText = "Disconnected"; statusBox.style.color = "#64748b";
            userAmp = 0; agentAmp = 0;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
        });
        vapi.on('volume-level', (v) => { agentAmp = v; });
    </script>
</body>
</html>
