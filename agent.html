<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexClinic | AI Receptionist</title>
    
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #0f172a; 
            color: #f8fafc;
            /* Dynamic padding based on screen height */
            padding: 2vh 5vw; 
            height: 100vh; /* Lock to screen height */
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden; /* Prevents scrolling on desktop/laptop */
        }

        .container {
            width: 100%;
            max-width: 1100px;
            height: 95vh; /* Takes up 95% of available vertical space */
            display: flex;
            flex-direction: column;
            justify-content: space-between; /* Spreads items evenly to fill height */
            text-align: center;
            gap: 1vh;
        }

        h1 {
            font-size: clamp(1.5rem, 4vh, 2.5rem); /* Scales font based on height */
            font-weight: 800;
            letter-spacing: -1px;
        }

        h1 span { color: #4CAF50; }

        .subtitle {
            color: #94a3b8;
            font-size: clamp(0.8rem, 2vh, 1rem);
            margin-top: -0.5vh;
        }

        /* --- 1. WAVEFORM (DYNAMIC HEIGHT) --- */
        #waveform-container {
            width: 100%;
            /* This is the key: height is a percentage of screen height */
            height: 35vh; 
            background: #000000;
            border-radius: 20px;
            border: 1px solid #1e293b;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        canvas { width: 100%; height: 100%; }

        /* --- 2. CONTROLS --- */
        .controls {
            display: flex;
            gap: 15px;
            justify-content: center;
        }

        .btn {
            padding: 1.5vh 30px; /* Padding scales with height */
            font-size: clamp(0.8rem, 1.8vh, 1rem);
            font-weight: 700;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: 0.2s ease;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        #call-btn { background: #4CAF50; color: white; }
        #decline-btn { background: #1e293b; color: #94a3b8; }
        #decline-btn:hover { background: #ef4444; color: white; }

        /* --- 3. STATUS --- */
        #status-box {
            font-size: 0.7rem;
            color: #64748b;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }

        /* --- 4. DASHBOARD (DYNAMIC HEIGHT) --- */
        .dashboard {
            display: flex;
            justify-content: space-between;
            gap: 15px;
            width: 100%;
        }

        .card {
            flex: 1;
            background: rgba(30, 41, 59, 0.4);
            /* Padding and height adjust to keep it on one page */
            padding: 2vh 15px; 
            border-radius: 16px;
            border: 1px solid #1e293b;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .card-label {
            font-size: 0.65rem;
            color: #94a3b8;
            text-transform: uppercase;
            margin-bottom: 5px;
        }

        .card-value {
            font-size: clamp(1.2rem, 3vh, 1.8rem);
            font-weight: 800;
            color: #ffffff;
        }

        /* --- MOBILE ADJUSTMENTS --- */
        @media (max-width: 768px) {
            body { overflow: auto; height: auto; padding: 20px; }
            .container { height: auto; gap: 20px; }
            #waveform-container { height: 200px; }
            .dashboard { flex-direction: column; }
            .controls { flex-direction: column; }
            .btn { width: 100%; justify-content: center; }
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>NexClinic <span>AI</span></h1>
            <p class="subtitle">Next-Gen Voice Receptionist</p>
        </header>

        <div id="waveform-container">
            <canvas id="waveform-canvas"></canvas>
        </div>

        <div class="controls">
            <button id="call-btn" class="btn"><span>📞</span> Call</button>
            <button id="decline-btn" class="btn"><span>🛑</span> Decline</button>
        </div>

        <div id="status-box">Status: Disconnected</div>

        <div class="dashboard">
            <div class="card">
                <div class="card-label">Calls Handled</div>
                <div class="card-value" id="stat-calls">0</div>
            </div>
            <div class="card">
                <div class="card-label">Talk Time</div>
                <div class="card-value" id="stat-time">0m 0s</div>
            </div>
            <div class="card">
                <div class="card-label">Appointments</div>
                <div class="card-value" id="stat-apps">0</div>
            </div>
        </div>
    </div>

    <script type="module">
        import Vapi from "https://esm.sh/@vapi-ai/web";

        const vapi = new Vapi("860dd056-1472-45de-a12e-df59fad649e5");
        const assistantId = "f4c6961f-9aa9-44e2-ba6e-ceb7d8233c32";

        const canvas = document.getElementById("waveform-canvas");
        const ctx = canvas.getContext("2d");
        const statusBox = document.getElementById("status-box");

        let audioContext, analyser, dataArray, animationId;
        let userAmp = 0, agentAmp = 0, phase = 0;

        function resize() {
            canvas.width = canvas.offsetWidth;
            canvas.height = canvas.offsetHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        function animateValue(id, start, end, duration, suffix = "") {
            const obj = document.getElementById(id);
            let startTimestamp = null;
            const step = (timestamp) => {
                if (!startTimestamp) startTimestamp = timestamp;
                const progress = Math.min((timestamp - startTimestamp) / duration, 1);
                if (id === "stat-time") {
                    const totalSecs = Math.floor(progress * ((56 * 60) + 33));
                    obj.innerHTML = `${Math.floor(totalSecs/60)}m ${totalSecs%60}s${suffix}`;
                } else {
                    obj.innerHTML = Math.floor(progress * (end - start) + start) + suffix;
                }
                if (progress < 1) window.requestAnimationFrame(step);
            };
            window.requestAnimationFrame(step);
        }

        window.addEventListener('load', () => {
            animateValue("stat-calls", 0, 70, 2000, "+");
            animateValue("stat-time", 0, 0, 2000, "+");
            animateValue("stat-apps", 0, 49, 2000, "+");
        });

        async function startVisualizer() {
            try {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                const source = audioContext.createMediaStreamSource(stream);
                analyser = audioContext.createAnalyser();
                analyser.fftSize = 1024;
                source.connect(analyser);
                dataArray = new Uint8Array(analyser.frequencyBinCount);
                draw();
            } catch (err) { console.error(err); }
        }

        function draw() {
            animationId = requestAnimationFrame(draw);
            analyser.getByteTimeDomainData(dataArray);
            let sum = 0;
            for (let i = 0; i < dataArray.length; i++) {
                let v = (dataArray[i] - 128) / 128;
                sum += v * v;
            }
            userAmp = Math.sqrt(sum / dataArray.length) * 120;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            drawSineWave(userAmp, "#ff4b2b", 0.6, 1.2); 
            drawSineWave(agentAmp * 50, "#4CAF50", 0.8, 1.0); 
            phase += 0.15;
        }

        function drawSineWave(amp, color, opacity, freq) {
            ctx.beginPath();
            ctx.lineWidth = 3;
            ctx.strokeStyle = color;
            ctx.globalAlpha = opacity;
            for (let x = 0; x < canvas.width; x++) {
                let y = (canvas.height / 2) + amp * Math.sin((x / 60) * freq + phase);
                if (x === 0) ctx.moveTo(x, y);
                else ctx.lineTo(x, y);
            }
            ctx.stroke();
        }

        document.getElementById("call-btn").addEventListener("click", () => {
            vapi.start(assistantId);
            startVisualizer();
        });

        document.getElementById("decline-btn").addEventListener("click", () => { vapi.stop(); });

        vapi.on('call-start', () => { statusBox.innerText = "Live Connection"; statusBox.style.color = "#4CAF50"; });
        vapi.on('call-end', () => { 
            cancelAnimationFrame(animationId);
            statusBox.innerText = "Disconnected"; statusBox.style.color = "#64748b";
            userAmp = 0; agentAmp = 0;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
        });
        vapi.on('volume-level', (v) => { agentAmp = v; });
    </script>
</body>
</html>
