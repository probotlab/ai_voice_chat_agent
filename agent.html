<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexClinic | AI Receptionist</title>
    
    <style>
        /* --- GLOBAL STYLES --- */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: #0f172a; /* Professional Dark Navy */
            color: #f8fafc;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 900px;
            text-align: center;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 8px;
            font-weight: 700;
            letter-spacing: -1px;
        }

        h1 span {
            color: #4CAF50; /* NexClinic Green */
        }

        p.subtitle {
            color: #94a3b8;
            margin-bottom: 30px;
            font-size: 1.1rem;
        }

        /* --- THE WAVEFORM CENTERPIECE --- */
        #waveform-container {
            width: 100%;
            height: 250px;
            background: #000000;
            border-radius: 24px;
            position: relative;
            margin-bottom: 30px;
            border: 1px solid #1e293b;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        canvas {
            width: 100%;
            height: 100%;
        }

        /* --- DASHBOARD STATS --- */
        .dashboard {
            display: flex;
            justify-content: space-between;
            gap: 20px;
            margin-bottom: 30px;
            width: 100%;
        }

        .card {
            flex: 1;
            background: rgba(30, 41, 59, 0.5);
            padding: 20px;
            border-radius: 20px;
            border: 1px solid #1e293b;
            transition: all 0.3s ease;
        }

        .card:hover {
            transform: translateY(-5px);
            border-color: #4CAF50;
            background: rgba(30, 41, 59, 0.8);
        }

        .card-label {
            font-size: 0.75rem;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 8px;
        }

        .card-value {
            font-size: 1.8rem;
            font-weight: 700;
            color: #ffffff;
        }

        /* --- CONTROLS --- */
        .controls {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn {
            padding: 16px 35px;
            font-size: 1rem;
            font-weight: 600;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        #call-btn {
            background: #4CAF50;
            color: white;
            box-shadow: 0 4px 15px rgba(76, 175, 80, 0.3);
        }

        #call-btn:hover {
            background: #45a049;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(76, 175, 80, 0.4);
        }

        #decline-btn {
            background: #1e293b;
            color: #94a3b8;
        }

        #decline-btn:hover {
            background: #ef4444;
            color: white;
        }

        #status-box {
            margin-top: 25px;
            font-size: 0.85rem;
            color: #64748b;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* --- RESPONSIVE LOGIC --- */
        @media (max-width: 768px) {
            h1 { font-size: 1.8rem; }
            .dashboard { flex-direction: column; gap: 12px; }
            #waveform-container { height: 180px; }
            .btn { width: 100%; justify-content: center; }
            .card { padding: 15px; }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>NexClinic <span>AI</span></h1>
        <p class="subtitle">Next-Generation Voice Receptionist</p>

        <!-- Waveform Centerpiece -->
        <div id="waveform-container">
            <canvas id="waveform-canvas"></canvas>
        </div>

        <!-- Dashboard Row -->
        <div class="dashboard">
            <div class="card">
                <div class="card-label">Calls Handled</div>
                <div class="card-value" id="stat-calls">0</div>
            </div>
            <div class="card">
                <div class="card-label">Total Talk Time</div>
                <div class="card-value" id="stat-time">0m 0s</div>
            </div>
            <div class="card">
                <div class="card-label">Appointments</div>
                <div class="card-value" id="stat-apps">0</div>
            </div>
        </div>

        <!-- Call Controls -->
        <div class="controls">
            <button id="call-btn" class="btn">
                <span>📞</span> Start Call
            </button>
            <button id="decline-btn" class="btn">
                <span>🛑</span> End Connection
            </button>
        </div>

        <div id="status-box">Status: Disconnected</div>
    </div>

    <script type="module">
        import Vapi from "https://esm.sh/@vapi-ai/web";

        // Vapi Configuration
        const vapi = new Vapi("860dd056-1472-45de-a12e-df59fad649e5");
        const assistantId = "f4c6961f-9aa9-44e2-ba6e-ceb7d8233c32";

        const canvas = document.getElementById("waveform-canvas");
        const ctx = canvas.getContext("2d");
        const statusBox = document.getElementById("status-box");

        let audioContext, analyser, dataArray, animationId;
        let userAmp = 0;   
        let agentAmp = 0;  
        let phase = 0;

        // Resize canvas to fit container
        function resize() {
            canvas.width = canvas.offsetWidth;
            canvas.height = canvas.offsetHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        // --- DASHBOARD ANIMATION ---
        function animateValue(id, start, end, duration, suffix = "") {
            const obj = document.getElementById(id);
            let startTimestamp = null;
            const step = (timestamp) => {
                if (!startTimestamp) startTimestamp = timestamp;
                const progress = Math.min((timestamp - startTimestamp) / duration, 1);
                
                if (id === "stat-time") {
                    const currentTotalSecs = Math.floor(progress * ((56 * 60) + 33));
                    const mins = Math.floor(currentTotalSecs / 60);
                    const secs = currentTotalSecs % 60;
                    obj.innerHTML = `${mins}m ${secs}s${suffix}`;
                } else {
                    obj.innerHTML = Math.floor(progress * (end - start) + start) + suffix;
                }

                if (progress < 1) window.requestAnimationFrame(step);
            };
            window.requestAnimationFrame(step);
        }

        // Trigger Stats on Load
        window.addEventListener('load', () => {
            animateValue("stat-calls", 0, 70, 2000, "+");
            animateValue("stat-time", 0, 0, 2000, "+");
            animateValue("stat-apps", 0, 49, 2000, "+");
        });

        // --- WAVEFORM LOGIC ---
        async function startVisualizer() {
            try {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                const source = audioContext.createMediaStreamSource(stream);
                
                analyser = audioContext.createAnalyser();
                analyser.fftSize = 1024;
                source.connect(analyser);

                dataArray = new Uint8Array(analyser.frequencyBinCount);
                draw();
            } catch (err) {
                console.error("Mic access denied", err);
            }
        }

        function draw() {
            animationId = requestAnimationFrame(draw);
            analyser.getByteTimeDomainData(dataArray);

            let sum = 0;
            for (let i = 0; i < dataArray.length; i++) {
                let v = (dataArray[i] - 128) / 128;
                sum += v * v;
            }
            userAmp = Math.sqrt(sum / dataArray.length) * 200;

            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Draw Waves
            drawSineWave(userAmp * 50, "#ff4b2b", 0.6, 1.2); // Patient (Red)
            drawSineWave(agentAmp * 50, "#4CAF50", 0.8, 1.0); // AI Agent (Green)
            
            phase += 0.15;
        }

        function drawSineWave(amp, color, opacity, freq) {
            ctx.beginPath();
            ctx.lineWidth = 3;
            ctx.strokeStyle = color;
            ctx.globalAlpha = opacity;

            for (let x = 0; x < canvas.width; x++) {
                let y = (canvas.height / 2) + amp * Math.sin((x / 60) * freq + phase);
                if (x === 0) ctx.moveTo(x, y);
                else ctx.lineTo(x, y);
            }
            ctx.stroke();
        }

        // --- BUTTON EVENTS ---
        document.getElementById("call-btn").addEventListener("click", () => {
            statusBox.innerText = "Status: Connecting...";
            vapi.start(assistantId);
            startVisualizer();
        });

        document.getElementById("decline-btn").addEventListener("click", () => {
            vapi.stop();
        });

        // --- VAPI LISTENERS ---
        vapi.on('call-start', () => {
            statusBox.innerText = "Status: Live Connection";
            statusBox.style.color = "#4CAF50";
        });

        vapi.on('call-end', () => {
            cancelAnimationFrame(animationId);
            statusBox.innerText = "Status: Disconnected";
            statusBox.style.color = "#64748b";
            userAmp = 0; agentAmp = 0;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
        });

        vapi.on('volume-level', (volume) => {
            agentAmp = volume; 
        });
    </script>
</body>
</html>
