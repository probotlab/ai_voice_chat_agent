<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexClinic | AI Receptionist</title>
    
    <style>
        /* --- GLOBAL STYLES --- */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #0f172a; 
            color: #f8fafc;
            padding: 4vh 5vw; /* 10% total side margin */
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden; 
        }

        .container {
            width: 100%;
            max-width: 1100px;
            height: auto; /* Tight fit */
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 20px; /* Tight vertical spacing */
            text-align: center;
        }

        h1 {
            font-size: clamp(1.5rem, 4vh, 2.2rem);
            font-weight: 800;
            letter-spacing: -1px;
            margin: 0;
        }

        h1 span { color: #4CAF50; }

        .subtitle {
            color: #94a3b8;
            font-size: clamp(0.8rem, 2vh, 0.95rem);
            margin-bottom: 5px;
        }

        /* --- 1. WAVEFORM --- */
        #waveform-container {
            width: 100%;
            height: 18vh; 
            background: #000000;
            border-radius: 7px;
            border: 1px solid #1e293b;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        canvas { width: 100%; height: 100%; }

        /* --- 2. CONTROLS --- */
        .controls {
            display: flex;
            gap: 12px;
            justify-content: center;
        }

        .btn {
            padding: 10px 25px;
            font-size: 0.9rem;
            font-weight: 700;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: 0.2s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        #call-btn { background: #4CAF50; color: white; }
        #decline-btn { background: #1e293b; color: #94a3b8; }
        #decline-btn:hover { background: #ef4444; color: white; }

        /* --- 3. STATUS --- */
        #status-box {
            font-size: 0.7rem;
            color: #64748b;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }

        /* --- 4. ACTIVITY SUMMARY (FADES IN ON TOOL CALL) --- */
        #summary-section {
            max-height: 0;
            opacity: 0;
            overflow: hidden;
            transition: all 0.7s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        #summary-section.visible {
            max-height: 200px;
            opacity: 1;
            margin: 10px 0;
        }

        .summary-header {
            font-size: 0.75rem;
            color: #4CAF50;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 8px;
            font-weight: 800;
        }

        .summary-table {
            background: rgba(30, 41, 59, 0.5);
            border: 1px solid rgba(76, 175, 80, 0.4);
            border-radius: 12px;
            padding: 18px;
            display: flex;
            justify-content: space-around;
            gap: 15px;
            box-shadow: 0 0 15px rgba(76, 175, 80, 0.1);
        }

        .summary-cell span {
            display: block;
            font-size: 0.6rem;
            color: #94a3b8;
            text-transform: uppercase;
            margin-bottom: 4px;
        }

        .summary-cell div {
            font-size: 0.9rem;
            font-weight: 700;
            color: #ffffff;
        }

        .status-booked { color: #4CAF50 !important; }
        .status-cancelled { color: #ef4444 !important; }

        /* --- 5. DASHBOARD STATS --- */
        .dashboard {
            display: flex;
            justify-content: space-between;
            gap: 12px;
            width: 100%;
        }

        .card {
            flex: 1;
            background: rgba(30, 41, 59, 0.3);
            padding: 1.5vh 10px;
            border-radius: 12px;
            border: 1px solid #1e293b;
        }

        .card-label {
            font-size: 0.6rem;
            color: #94a3b8;
            text-transform: uppercase;
            margin-bottom: 4px;
        }

        .card-value {
            font-size: clamp(1rem, 2.5vh, 1.4rem);
            font-weight: 800;
            color: #ffffff;
        }

        @media (max-width: 768px) {
            body { overflow: auto; height: auto; padding: 20px; }
            .container { height: auto; gap: 15px; }
            .dashboard, .summary-table { flex-direction: column; }
            .controls { flex-direction: column; }
            .btn { width: 100%; justify-content: center; }
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>NexClinic <span>AI</span></h1>
            <p class="subtitle">Next-Gen Voice Receptionist</p>
        </header>

        <div id="waveform-container">
            <canvas id="waveform-canvas"></canvas>
        </div>

        <div class="controls">
            <button id="call-btn" class="btn"><span>📞</span> Call</button>
            <button id="decline-btn" class="btn"><span>🛑</span> Decline</button>
        </div>

        <div id="status-box">Status: Disconnected</div>

        <!-- Dynamic Activity Table -->
        <div id="summary-section">
            <div class="summary-header" id="summary-title">Booking/Cancellation Details</div>
            <div class="summary-table">
                <div class="summary-cell"><span>Patient</span><div id="sum-name">-</div></div>
                <div class="summary-cell"><span>Action</span><div id="sum-status">-</div></div>
                <div class="summary-cell"><span>Reason</span><div id="sum-reason">-</div></div>
                <div class="summary-cell"><span>Schedule</span><div id="sum-date">-</div></div>
            </div>
        </div>

        <div class="dashboard">
            <div class="card">
                <div class="card-label">Calls Handled</div>
                <div class="card-value" id="stat-calls">0</div>
            </div>
            <div class="card">
                <div class="card-label">Talk Time</div>
                <div class="card-value" id="stat-time">0m 0s</div>
            </div>
            <div class="card">
                <div class="card-label">Appointments</div>
                <div class="card-value" id="stat-apps">0</div>
            </div>
        </div>
    </div>

    <script type="module">
        import Vapi from "https://esm.sh/@vapi-ai/web";

        const vapi = new Vapi("860dd056-1472-45de-a12e-df59fad649e5");
        const assistantId = "f4c6961f-9aa9-44e2-ba6e-ceb7d8233c32";

        const canvas = document.getElementById("waveform-canvas");
        const ctx = canvas.getContext("2d");
        const statusBox = document.getElementById("status-box");

        let audioContext, analyser, dataArray, animationId;
        let userAmp = 0, agentAmp = 0, phase = 0;

        function resize() {
            canvas.width = canvas.offsetWidth;
            canvas.height = canvas.offsetHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        // UI TRIGGER: This is called automatically when the AI takes action
        window.showSummary = function(name, status, reason, date) {
            const section = document.getElementById('summary-section');
            document.getElementById('sum-name').innerText = name;
            const st = document.getElementById('sum-status');
            st.innerText = status;
            st.className = status.includes('BOOKED') ? 'status-booked' : 'status-cancelled';
            document.getElementById('sum-reason').innerText = reason || "General Visit";
            document.getElementById('sum-date').innerText = date;
            
            section.classList.add('visible');
        };

        // Numbers Animation
        function animateValue(id, start, end, duration, suffix = "") {
            const obj = document.getElementById(id);
            let startTimestamp = null;
            const step = (timestamp) => {
                if (!startTimestamp) startTimestamp = timestamp;
                const progress = Math.min((timestamp - startTimestamp) / duration, 1);
                if (id === "stat-time") {
                    const secs = Math.floor(progress * ((56 * 60) + 33));
                    obj.innerHTML = `${Math.floor(secs/60)}m ${secs%60}s${suffix}`;
                } else {
                    obj.innerHTML = Math.floor(progress * (end - start) + start) + suffix;
                }
                if (progress < 1) window.requestAnimationFrame(step);
            };
            window.requestAnimationFrame(step);
        }

        window.addEventListener('load', () => {
            animateValue("stat-calls", 0, 70, 2000, "+");
            animateValue("stat-time", 0, 0, 2000, "+");
            animateValue("stat-apps", 0, 49, 2000, "+");
        });

        // Waveform Logic
        async function startVisualizer() {
            try {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                const source = audioContext.createMediaStreamSource(stream);
                analyser = audioContext.createAnalyser();
                analyser.fftSize = 1024;
                source.connect(analyser);
                dataArray = new Uint8Array(analyser.frequencyBinCount);
                draw();
            } catch (err) { console.error(err); }
        }

        function draw() {
            animationId = requestAnimationFrame(draw);
            analyser.getByteTimeDomainData(dataArray);
            let sum = 0;
            for (let i = 0; i < dataArray.length; i++) {
                let v = (dataArray[i] - 128) / 128;
                sum += v * v;
            }
            userAmp = Math.sqrt(sum / dataArray.length) * 120;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            drawSineWave(userAmp *7, "#ff4b2b", 0.6, 1.2); 
            drawSineWave(agentAmp * 30, "#4CAF50", 0.8, 1.0); 
            phase += 0.15;
        }

        function drawSineWave(amp, color, opacity, freq) {
            ctx.beginPath();
            ctx.lineWidth = 3;
            ctx.strokeStyle = color;
            ctx.globalAlpha = opacity;
            for (let x = 0; x < canvas.width; x++) {
                let y = (canvas.height / 2) + amp * Math.sin((x / 60) * freq + phase);
                if (x === 0) ctx.moveTo(x, y);
                else ctx.lineTo(x, y);
            }
            ctx.stroke();
        }

        document.getElementById("call-btn").addEventListener("click", () => {
            vapi.start(assistantId);
            startVisualizer();
        });

        document.getElementById("decline-btn").addEventListener("click", () => { vapi.stop(); });

        vapi.on('call-start', () => { statusBox.innerText = "Live Connection"; statusBox.style.color = "#4CAF50"; });
        
        vapi.on('call-end', () => { 
            cancelAnimationFrame(animationId);
            statusBox.innerText = "Disconnected"; statusBox.style.color = "#64748b";
            userAmp = 0; agentAmp = 0;
            document.getElementById('summary-section').classList.remove('visible');
            ctx.clearRect(0, 0, canvas.width, canvas.height);
        });

        // --- 1. THE GREEN BAR FIX (VOLUME) ---
        vapi.on('volume-level', (v) => {
            agentAmp = v; 
        });

        // --- 2. THE SUMMARY TABLE FIX (TOOL CALLS) ---
        vapi.on('message', (message) => {
            console.log("New Message:", message.type, message); // Check your console (F12)

            // We listen for tool-calls (when AI starts the action) 
            // or tool-call-result (when the action is finished)
            if (message.type === 'tool-calls' || message.type === 'tool-call-result') {
                const toolCall = (message.toolCalls && message.toolCalls[0]) || 
                                 (message.toolCallList && message.toolCallList[0]) || 
                                 message.toolCall;

                if (!toolCall) return;

                const funcName = toolCall.function?.name || toolCall.name;
                const args = typeof toolCall.function?.arguments === 'string' 
                             ? JSON.parse(toolCall.function.arguments) 
                             : (toolCall.function?.arguments || toolCall.arguments);

                if (funcName === 'schedule_appointment') {
                    const dateStr = args.start_time ? new Date(args.start_time).toLocaleString([], {
                        month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit'
                    }) : "Scheduled";
                    window.showSummary(args.patient_name, "BOOKED", args.reason, dateStr);
                } 
                else if (funcName === 'cancel_appointment') {
                    window.showSummary(args.patient_name, "CANCELLED", "User Request", args.date || "Today");
                }
            }
        });

        // --- 3. CALL MANAGEMENT ---
        vapi.on('call-start', () => { 
            statusBox.innerText = "Live Connection"; 
            statusBox.style.color = "#4CAF50"; 
        });

        vapi.on('call-end', () => { 
            cancelAnimationFrame(animationId);
            statusBox.innerText = "Disconnected"; 
            statusBox.style.color = "#64748b";
            userAmp = 0; agentAmp = 0;
            // Hide the table when call ends so it's fresh for next time
            document.getElementById('summary-section').classList.remove('visible');
            ctx.clearRect(0, 0, canvas.width, canvas.height);
        });
    </script>
</body>
</html>
